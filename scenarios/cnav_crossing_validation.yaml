# Validation target: ranking and politeness under symmetric four-way crossing.
# Origin: simplified from the crossing-style layouts referenced by the MyStyle baselines.
name: cnav-crossing-validation
time_step: 0.1
steps: 18
agents:
  - name: south_to_north
    profile:
      radius: 0.4
      max_speed: 1.0
    initial_position: [0.0, -2.0]
    initial_velocity: [0.0, 0.0]
    preferred_velocity: [0.0, 1.0]
    goal_position: [0.0, 2.0]
    preferred_speed: 1.0
  - name: north_to_south
    profile:
      radius: 0.4
      max_speed: 1.0
    initial_position: [0.0, 2.0]
    initial_velocity: [0.0, 0.0]
    preferred_velocity: [0.0, -1.0]
    goal_position: [0.0, -2.0]
    preferred_speed: 1.0
  - name: west_to_east
    profile:
      radius: 0.4
      max_speed: 1.0
    initial_position: [-2.0, 0.0]
    initial_velocity: [0.0, 0.0]
    preferred_velocity: [1.0, 0.0]
    goal_position: [2.0, 0.0]
    preferred_speed: 1.0
  - name: east_to_west
    profile:
      radius: 0.4
      max_speed: 1.0
    initial_position: [2.0, 0.0]
    initial_velocity: [0.0, 0.0]
    preferred_velocity: [-1.0, 0.0]
    goal_position: [-2.0, 0.0]
    preferred_speed: 1.0
