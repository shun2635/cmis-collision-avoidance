# Validation target: ranking and politeness under symmetric four-way crossing.
# Origin: simplified from the central obstacle blocks in intersectionLoop.cpp.
name: cnav-crossing-validation
time_step: 0.1
steps: 1000
agents:
  - name: south_to_north
    profile:
      radius: 0.4
      max_speed: 1.0
    initial_position: [0.0, -3.0]
    initial_velocity: [0.0, 0.0]
    preferred_velocity: [0.0, 1.0]
    goal_position: [0.0, 3.0]
    preferred_speed: 1.0
  - name: north_to_south
    profile:
      radius: 0.4
      max_speed: 1.0
    initial_position: [0.0, 3.0]
    initial_velocity: [0.0, 0.0]
    preferred_velocity: [0.0, -1.0]
    goal_position: [0.0, -3.0]
    preferred_speed: 1.0
  - name: west_to_east
    profile:
      radius: 0.4
      max_speed: 1.0
    initial_position: [-3.0, 0.0]
    initial_velocity: [0.0, 0.0]
    preferred_velocity: [1.0, 0.0]
    goal_position: [3.0, 0.0]
    preferred_speed: 1.0
  - name: east_to_west
    profile:
      radius: 0.4
      max_speed: 1.0
    initial_position: [3.0, 0.0]
    initial_velocity: [0.0, 0.0]
    preferred_velocity: [-1.0, 0.0]
    goal_position: [-3.0, 0.0]
    preferred_speed: 1.0
obstacles:
  - closed: true
    vertices:
      - [-6.0, 6.0]
      - [-6.0, 0.8]
      - [-0.8, 0.8]
      - [-0.8, 6.0]
  - closed: true
    vertices:
      - [0.8, 6.0]
      - [0.8, 0.8]
      - [6.0, 0.8]
      - [6.0, 6.0]
  - closed: true
    vertices:
      - [-6.0, -0.8]
      - [-6.0, -6.0]
      - [-0.8, -6.0]
      - [-0.8, -0.8]
  - closed: true
    vertices:
      - [0.8, -0.8]
      - [0.8, -6.0]
      - [6.0, -6.0]
      - [6.0, -0.8]
