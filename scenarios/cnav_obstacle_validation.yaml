# Validation target: interaction between CNav coordination and obstacle constraints.
# Origin: simplified from the obstacle-heavy MyStyle paper-facing baselines.
name: cnav-obstacle-validation
time_step: 1.0
steps: 1000
stop_when_all_agents_reach_goals: true
algorithm_overrides:
  cnav:
    coordination_factor: 0.8
    simulation_horizon_steps: 10
    action_update_interval: 0.1
    update_every_step: true
    minimum_action_update_step: 2
    apply_selected_action_next_step: false
    top_k_constrained_neighbors: 4
    action_speed: 5.0
    beta_degrees: 45.0
agents:
  - name: lower_lane
    profile:
      radius: 10.0
      max_speed: 5.0
      neighbor_dist: 100.0
      max_neighbors: 4
      time_horizon: 0.3
      time_horizon_obst: 0.3
    initial_position: [-62.5, -17.5]
    initial_velocity: [0.0, 0.0]
    preferred_velocity: [5.0, 0.0]
    goal_position: [62.5, -17.5]
    preferred_speed: 5.0
  - name: upper_lane
    profile:
      radius: 10.0
      max_speed: 5.0
      neighbor_dist: 100.0
      max_neighbors: 4
      time_horizon: 0.3
      time_horizon_obst: 0.3
    initial_position: [-62.5, 17.5]
    initial_velocity: [0.0, 0.0]
    preferred_velocity: [5.0, 0.0]
    goal_position: [62.5, 17.5]
    preferred_speed: 5.0
obstacles:
  - closed: true
    vertices:
      - [-10.0, -30.0]
      - [-10.0, 30.0]
      - [10.0, 30.0]
      - [10.0, -30.0]
